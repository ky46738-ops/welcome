<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#07111f"><title>🪞幻影膠囊安裝入口</title><style>
:root{--bg:#07111f;--panel:#101b30;--panel2:#17253f;--text:#eff5ff;--muted:#9eb0ca;--line:#2a3f62;--accent:#8cb0ff;--ok:#75d7a6;--warn:#ffd27a;--bad:#ff909b}
